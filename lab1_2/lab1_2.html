<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            max-width: 800px;
            margin: 40px auto;
        }
        
        nav {
            display: flex; /*чтобы разлепить хедер*/
        }
        
        nav a {
            margin-right: 20px; /*отступ между ссылками*/
        }
       
        section { 
            border: 1px solid #b3b3b3; 
            padding: 20px; 
            min-height: 200px; 
            scroll-margin-top: 150px; /*отступ сверху при переходе по ссылке*/
        }
        h2 {
            font-weight: normal;
            margin: 0;
            text-transform: uppercase; /*что бы заголовки не слипалист*/
        }

        header { 
            position: sticky; 
            top: 0; 
            background: white; 
            border: 1px solid #b3b3b3; 
            padding: 15px 20px; 
        }
    </style>
</head>
